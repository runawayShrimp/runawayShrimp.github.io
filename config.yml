baseURL: https://runawayshrimp.github.io/
# languageCode: en-us
title: "暴走虾球"
theme: PaperModX
paginate: 5

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
pygmentsUseClasses: true
enableEmoji: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: 
  author: [B卜卜, 啾啾咕]
  mainSections:
    - posts
  keywords: [blog, lifestyle, food, reviews]
  disableAnchoredHeadings: false
  images: ["cover.jpg"]
  DateFormat: "2006-01-02"
  useCustomAnalytics: false

  defaultTheme: light
  disableThemeToggle: false
  ShowShareButtons: true
  ShowAuthor: true
  ShowReadingTime: true
  ShowWordCount: false
  disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  TocSide: "left"
  EnableInstantClick: true
  EnableImageZoom: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false

  commentSystems:
    disqus:
      shortname: 
    # remark42:
    #   url: https://remark42.reorx.com
    #   site: reorx.github.io
    # telegramWidget:
    #   channel: reorx_share
    #   accentColor: "9077e1"
    #   limit: 20
    waline: 
      url: https://waline-azure.vercel.app
  defaultCommentSystems:
    waline: true

  profileMode:
    enabled: false
    title: Runaway Shrimp
    imageUrl: "cover.jpg"
    imageTitle: lonely margins of the sea
    imageWidth: 120
    imageHeight: 120
    # buttons:
    #   - name: About
    #     url: /about
    #   - name: Posts
    #     url: /posts/
    #   - name: Tags
    #     url: /tags/


  homeInfoParams:
    Title: "Runaway Shrimp"
    Content: 虾球快跑！这里不是家----

  socialIcons:
    - name: instagram
      url: "https://www.instagram.com/runawayshrimp/"
    - name: rss-simple
      url: "index.xml"

  # editPost:
  #   URL: "https://github.com/reorx/hugo-PaperModX/tree/exampleSite/content"
  #   Text: "Suggest Changes" # edit text
  #   appendFilePath: true # to append file path to Edit link

  label:
      text: "Home"
      icon: 'apple-touch-icon.png'
      iconHeight: 30

  # assets:
  #     favicon: "assets/favicon.ico"
  #     favicon16x16: "assets/favicon-16x16.png"
  #     favicon32x32: "assets/favicon-32x32.png"
  #     apple_touch_icon: "assets/apple-touch-icon.png"
  #     safari_pinned_tab: "assets/safari-pinned-tab.svg"

  cover:
      hidden: true # hide everywhere but not in structured data
      hiddenInList: true # hide on list pages and home
      hiddenInSingle: false # hide on single page

  fuseOpts:
      isCaseSensitive: false
      shouldSort: true
      location: 0
      distance: 1000
      threshold: 0.4
      minMatchCharLength: 0
      keys: ["title", "permalink", "summary", "content"]

minify:
  disableXML: true
  minifyOutput: true

languages:
  en:
    languageName: "English"
    weight: 1
    menu:
      main:
        - name: About
          url: /about
          weight: 3
        - name: Tags
          url: /tags/
          weight: 4
        - name: Archive
          url: /archives/
          weight: 5
        - name: Search
          url: /search/
          weight: 10

